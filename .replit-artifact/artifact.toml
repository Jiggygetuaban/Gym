kind = "mobile"
previewPath = "/"
title = "GymLog"
version = "1.0.0"
id = "artifacts/gym-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22738

[services.development]
run = "pnpm --filter @workspace/gym-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/gym-tracker", "run", "serve" ]

[services.env]
PORT = "22738"
BASE_PATH = "/"
